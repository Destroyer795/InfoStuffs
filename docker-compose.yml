services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=${PORT}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NODE_ENV=development
    command: npm run dev
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - infostuffs-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_SUPABASE_KEY=${VITE_SUPABASE_KEY}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./.env
    networks:
      - infostuffs-net

networks:
  infostuffs-net:
    driver: bridge
